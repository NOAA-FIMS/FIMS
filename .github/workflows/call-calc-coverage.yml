# Runs covr::codecov() to calculate code coverage.
name: call-calc_coverage

on:
  pull_request:
    branches:
      - main
    paths:
      - 'R/**'
      - 'inst/**'
      - 'src/**'
      - 'tests/**'
  push:
    branches:
      - main
    paths:
      - 'R/**'
      - 'inst/**'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

concurrency:
  group: r-cmd-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
 
jobs:
  call-workflow:
    if: >-
      github.repository == 'NOAA-FIMS/FIMS' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false)
    uses: nmfs-ost/ghactions4r/.github/workflows/calc-coverage.yml@main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
