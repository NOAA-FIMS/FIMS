name: Create Issue from PR Command

on:
  issue_comment:
    types: [created]

jobs:
  create_issue_from_comment:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/create-issue') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    
    steps:
      - name: Acknowledge command with a reaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -F content="rocket"

      - name: Create issue and link to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PR_AUTHOR: ${{ github.event.issue.user.login }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching details for PR #$PR_NUMBER..."
          
          gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q .title > pr_title.txt
          gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q .body > pr_body.txt
          
          echo "Autogenerated from PR #$PR_NUMBER." > new_issue_body.txt
          echo "" >> new_issue_body.txt
          echo "### Original PR Description:" >> new_issue_body.txt
          cat pr_body.txt >> new_issue_body.txt
          
          echo "Creating the issue..."
          NEW_ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "Tracking Issue: $(cat pr_title.txt)" \
            --body-file new_issue_body.txt \
            --assignee "$PR_AUTHOR" \
            --label "status: in progress")
            
          ISSUE_NUMBER=$(echo "$NEW_ISSUE_URL" | awk -F'/' '{print $NF}')
          echo "Created issue #$ISSUE_NUMBER"
          
          echo "" >> pr_body.txt
          echo "Resolves #$ISSUE_NUMBER" >> pr_body.txt
          
          echo "Linking issue to PR..."
          gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file pr_body.txt
          
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "✅ I've created issue #$ISSUE_NUMBER to track this PR, assigned it to @$PR_AUTHOR, and linked them together!"
