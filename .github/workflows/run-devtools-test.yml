name: run-devtools-test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths: &core_paths
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - 'R/**'
      - 'src/**'
      - 'tests/**'
      - 'inst/**'
      - 'data/**'
      - 'data-raw/**'
      - 'vignettes/**'
  push:
    branches:
      - main
    paths: *core_paths

permissions: {}

# Cancel runs happening simultaneously on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devtools-test:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: "yes"
      TESTTHAT_PROGRESS: "plain"
      R_BACKTRACE_ON_ERROR: "full"

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::snowfall
          needs: check

      - name: Run devtools::test()
        shell: Rscript {0}
        run: |
          devtools::test()
