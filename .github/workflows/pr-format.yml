name: pr-format

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  format-code:
    name: Format C++ and R code
    runs-on: ubuntu-latest
    steps:
      - name: Check if fork
        id: check_fork
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
            echo "This PR is from a fork"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            echo "This PR is from the same repository"
          fi
      
      - name: Find comment about formatting
        uses: peter-evans/find-comment@v4
        id: pull
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '🎨 Chore: code formatting workflow'

      - name: Comment on fork PR with formatting instructions
        if: steps.check_fork.outputs.is_fork == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment-id: ${{ steps.pull.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🎨 Chore: code formatting workflow
            
            Our automated workflows cannot run on forks because of permission issues. Please run this locally:
            
            ### Format C++ code
            ```bash
            clang-format -i --style="{BasedOnStyle: Google, SortIncludes: false}" $(find ./inst/include ./src ./tests/gtest -name "*.hpp" -o -name "*.cpp")
            ```
            
            ### Format R code
            ```r
            styler::style_pkg()
            # Explicit roclets + source loading prevents RcppExports regeneration
            roxygen2::roxygenise(roclets = c("rd", "namespace"), load_code = "source")
            styler::style_pkg()
            roxygen2::roxygenise(roclets = c("rd", "namespace"), load_code = "source")
            usethis::use_tidy_description()
            ```
          edit-mode: replace

      - name: Checkout code
        if: steps.check_fork.outputs.is_fork == 'false'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install curl dependency
        if: steps.check_fork.outputs.is_fork == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install libcurl4-openssl-dev

      - name: Setup R
        if: steps.check_fork.outputs.is_fork == 'false'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        if: steps.check_fork.outputs.is_fork == 'false'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            remotes
            styler
            roxygen2
            usethis

      - name: Style R code
        if: steps.check_fork.outputs.is_fork == 'false'
        run: |
          results <- styler::style_pkg()
          if (any(is.na(results[["changed"]]))) stop("styler threw an error")
        shell: Rscript {0}

      - name: Document R code
        if: steps.check_fork.outputs.is_fork == 'false'
        run: Rscript -e 'roxygen2::roxygenise(roclets = c("rd", "namespace"), load_code = "source")'

      - name: Style R code again
        if: steps.check_fork.outputs.is_fork == 'false'
        run: | 
          results <- styler::style_pkg()
          if (any(is.na(results[["changed"]]))) stop("styler threw an error")
        shell: Rscript {0}

      - name: Document R code again
        if: steps.check_fork.outputs.is_fork == 'false'
        run: Rscript -e 'roxygen2::roxygenise(roclets = c("rd", "namespace"), load_code = "source")'
        
      - name: Style DESCRIPTION file
        if: steps.check_fork.outputs.is_fork == 'false'
        run: Rscript -e 'usethis::use_tidy_description()'

      - name: Clean up artifacts and unwanted RcppExports
        if: steps.check_fork.outputs.is_fork == 'false'
        run: |
          rm -f src/RcppExports.cpp R/RcppExports.R
          rm -f .github/*.rds .github/*.Rds .github/R-version

      - name: Run clang-format
        if: steps.check_fork.outputs.is_fork == 'false'
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: './inst/include ./src ./tests/gtest'
          extensions: 'hpp, cpp'
          style: "{BasedOnStyle: Google, SortIncludes: false}"
          inplace: True

      - name: Check for changes
        if: steps.check_fork.outputs.is_fork == 'false'
        id: check_changes
        run: |
          git diff --quiet || echo "has_changes=true" >> "$GITHUB_OUTPUT"
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request with formatting changes
        if: steps.check_fork.outputs.is_fork == 'false' && steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: format-code-${{ github.head_ref }}
          title: "🎨 Chore: format feature branch `${{ github.head_ref }}`"
          body: |
            This PR contains automated formatting changes.
          commit-message: "Chore: format feature branch"
          base: ${{ github.head_ref }}
