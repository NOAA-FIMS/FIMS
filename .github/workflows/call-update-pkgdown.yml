# Updates the exiting pkgdown site for a repository by deploying the changes
# made to the pkgdown site to a branch called gh-pages.
name: call-update-pkgdown

on:
  pull_request:
    branches:
      - main
    paths: &core_paths
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - 'man/**'
      - 'vignettes/**'
      - 'inst/**'
      - 'README.md'
      - 'pkgdown/**'
      - '.github/workflows/build-pkgdown.yml'
      - 'CMakeLists.txt'
      - 'src/**'
  push:
    branches: 
      - main
    paths: *core_paths
  workflow_dispatch:
  # below is a trigger for when there are changes to the fims website, it pulls
  # the bootstrap file name from there which occasionally changes
  # file in that repo, which change whenever a significant change is made to
  # the website for some reason
  repository_dispatch:
    types: [file-updated]

# Cancel runs happening simultaneously on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-workflow:
    uses: noaa-fims/FIMS/.github/workflows/build-pkgdown.yml@main
    with:
      # Expressions are TRUE only on a push to main
      is_main_push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
