on:
  # TODO: 
  push:
    branches: [dev]
  pull_request:
    # branches: [dev]

name: r-universe-R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # corresponds to MacOS arm64
          - {os: macos-14,   r: 'release'}
          - {os: macos-14,   r: 'oldrel-1'}
          # corresponds to MacOS x86_64
          - {os: macos-13, r: 'release'}
          - {os: macos-13, r: 'oldrel-1'}
          # corresponds to Windows
          - {os: windows-2022, r: 'release'}
          - {os: windows-2022,  r: 'devel'}
          - {os: windows-2022, r: 'oldrel-1'}
          # corresponds to Linux x86_64
          - {os: ubuntu-24.04,  r: 'release'}
          - {os: ubuntu-24.04,  r: 'devel', http-user-agent: 'release'}
          # corresponds to Linux arm64
          - {os: ubuntu-24.04-arm,  r: 'release'}
          - {os: ubuntu-24.04-arm,  r: 'devel', http-user-agent: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2 
      
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Run R-universe check 
        id: rcmdcheck
        run: |
          # Crucial: Enable 'pipefail' and 'exit on error' for robust scripting
          # This applies to all OSes running this Bash script.
          {
            set -euo pipefail
            # -e: Exit immediately if a command exits with a non-zero status.
            # -u: Treat unset variables as an error.
            # -o pipefail: Ensures that a command failing in a pipeline causes the 
            # pipeline to fail.
            # Set environment variables 
            export FIMS="."
            export CHECKARGS="--no-manual --no-vignettes"
            export MY_R_LIB="${{ github.workspace }}/../mylib"

            # Create library directory 
             mkdir -p "$MY_R_LIB"
            
            # Run R CMD INSTALL and capture output to log file and console
            # Due to 'set -o pipefail', if R CMD INSTALL fails, the whole line 
            # will cause script to exit.
            echo "Running R CMD INSTALL..."
            # Run R CMD INSTALL and capture output to log file and console 
            R CMD INSTALL "$FIMS" --library="$MY_R_LIB" --build 

            # Run R CMD check. This command's exit code will determine step success/failure.
            # R CMD check "$FIMS" --library="$MY_R_LIB" --install=check:install.log "$CHECKARGS" 
            R CMD check "$FIMS" --library="$MY_R_LIB" "$CHECKARGS"
          } 2>&1 | tee install_check.log
        shell: bash
        
      - name: Upload check results on failure
        if: failure() # This step will only run if a previous step in the job failed
        uses: actions/upload-artifact@main
        with:
          # Unique name for the artifact per OS
          name: ${{ runner.os }}-r${{ matrix.config.r }}-results
          path: install_check.log