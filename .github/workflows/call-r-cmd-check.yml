# Runs R CMD CHECK on the package.
name: call-r-cmd-check

on:
  push:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .devcontainer
      - .github
      - '.gitignore'
      - '.Rbuildignore'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'man'
      - 'README.md'
  workflow_dispatch:

jobs:
  call-workflow:
    uses: nmfs-ost/ghactions4r/.github/workflows/r-cmd-check.yml@main
    with: 
      gha_timeout_minutes: 100
      
