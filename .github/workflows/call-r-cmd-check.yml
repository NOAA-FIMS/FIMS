# Runs R CMD CHECK on the package.
name: call-r-cmd-check

on:
  push:
  workflow_dispatch:

jobs:
  call-workflow:
    uses: nmfs-ost/ghactions4r/.github/workflows/r-cmd-check.yml@main
    with: 
      gha_timeout_minutes: 60

  log-errors-job:
    needs: call-workflow
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Download R Check Logs
        uses: actions/download-artifact@v4
        with:
          # Note: The name depends on the reusable workflow. 
          # Common names are 'check-logs' or 'r-cmd-check-results'
          path: check-logs

      - name: Write Specific Errors to Summary
        run: |
          echo "### ⚠️ R CMD CHECK Failure Details" >> $GITHUB_STEP_SUMMARY
          echo "#### Extract from 00check.log:" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          
          # Find any .log files in the downloaded artifact and show the last 120 lines
          find check-logs -name "*.log" -exec tail -n 120 {} + >> $GITHUB_STEP_SUMMARY
          
          echo '```' >> $GITHUB_STEP_SUMMARY
