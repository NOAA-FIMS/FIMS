# Workflow derived from https://github.com/r-lib/actions/tree/master/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_call:
  pull_request:
    branches:
      - main
    paths: &core_paths
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - 'man/**'
      - 'vignettes/**'
      - 'inst/**'
      - 'README.md'
      - 'pkgdown/**'
      - '.github/workflows/build-pkgdown.yml'
      - 'CMakeLists.txt'
      - 'src/**'
  push:
    branches:
      - main
    paths: *core_paths
  workflow_dispatch:
  # below is a trigger for when there are changes to the fims website, it pulls
  # the bootstrap file name from there which occasionally changes
  # file in that repo, which change whenever a significant change is made to
  # the website for some reason
  repository_dispatch:
    types: [file-updated]

name: build-pkgdown

# no permissions are needed by the default github token for this workflow to 
# run, so don't pass any.
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions:
  contents: write

# Cancel runs happening simultaneously on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: build pkgdown
        env:
          R_KEEP_PKG_SOURCE: "yes"
          TESTTHAT_PROGRESS: "plain"
          R_BACKTRACE_ON_ERROR: "full"
        run: |
          pkgdown::build_site(override = list(destination = "docs"))
        shell: Rscript {0}

      - name: Installing build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils grep findutils
          sudo apt install cmake doxygen gcc git ninja-build

      - name: Building HTML documentation with Doxygen
        # Do not run -DDOXYGEN_WARN_AS_ERROR=YES locally
        # FIX? run cmake --build build --parallel 16
        run: |
          cmake -S . -B build -G Ninja -DDOXYGEN_WARN_AS_ERROR=FAIL_ON_WARNINGS
          cmake --build build

      - name: Deploy html documentation with Doxygen
        # Do not run mkdir doxygen and mv build/html doxygen locally
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          mkdir -p docs/doxygen
          cp -a doxygen/html/. docs/doxygen/

      - name: save pkgdown output
        uses: actions/upload-artifact@v7
        with:
          name: pkgdown-site-with-reports
          path: docs/
  
      - name: Deploy package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This is the folder we built in the "build pkgdown" step
          publish_dir: ./docs
     