on:
  push:

name: R-universe-check

permissions: read-all
  
jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Build package
        run: |
          install.packages("devtools")
          devtools::build()
        shell: Rscript {0}

      - name: Install and check package on Windows
        if: matrix.config.os == 'windows-latest'
        run: |
          R CMD INSTALL ..\FIMS_0.4.0.tar.gz --build 2>&1 | tee install.log
          R CMD check ..\FIMS_0.4.0.tar.gz --install=check:install.log --no-manual --no-vignettes || true

      - name: Install and check package on other OSs
        if: matrix.config.os != 'windows-latest'
        run: |
          R CMD INSTALL ../FIMS_0.4.0.tar.gz --build 2>&1 | tee install.log
          R CMD check ../FIMS_0.4.0.tar.gz --install=check:install.log --no-manual --no-vignettes || true