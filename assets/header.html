      link.href = link.hash; // Just use the fragment
    }
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  function updateTocActive() {
    var links = Array.from(document.querySelectorAll('.toc a'));
    var anchors = links.map(link => document.getElementById(link.getAttribute('href').replace('#', '')));
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var offset = 150; // Match your scroll-margin-top

    let currentActive = -1;
    for (let i = anchors.length - 1; i >= 0; i--) {
      if (anchors[i] && (anchors[i].getBoundingClientRect().top + window.scrollY - offset) <= scrollTop) {
        currentActive = i;
        break;
      }
    }
    links.forEach((link, i) => {
      link.classList.remove('active', 'aboveActive');
      if (i === currentActive) {
        link.classList.add('active');
      } else if (i < currentActive) {
        link.classList.add('aboveActive');
      }
    });
  }
  window.addEventListener('scroll', updateTocActive);
  window.addEventListener('hashchange', updateTocActive);
  updateTocActive();
});
</script>
